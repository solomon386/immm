services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: web-im-chat-app:${APP_ENV:-production}
    container_name: web-im-chat-app
    restart: unless-stopped
    command: ["pm2-runtime", "ecosystem.config.cjs", "--env", "${APP_ENV:-production}"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: ${APP_ENV:-production}
      PORT: ${APP_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-web_im}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-web_im_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-web_im_chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-im}
      MESSAGE_RETENTION_SECONDS: ${MESSAGE_RETENTION_SECONDS:-}
      ENABLE_CALLS: ${ENABLE_CALLS:-false}
      PM2_INSTANCES: ${PM2_INSTANCES:-1}
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${APP_PORT:-3000}/api/config').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - web_im_chat

  media-cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    image: web-im-chat-app:${APP_ENV:-production}
    container_name: web-im-chat-media-cleanup
    restart: unless-stopped
    command: ["node", "scripts/media-cleanup-scheduler.js"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-web_im}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-web_im_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-web_im_chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-im}
      MESSAGE_RETENTION_SECONDS: ${MESSAGE_RETENTION_SECONDS:-}
      MEDIA_CLEANUP_CRON: "${MEDIA_CLEANUP_CRON:-*/1 * * * *}"
      MEDIA_CLEANUP_RUN_ON_START: ${MEDIA_CLEANUP_RUN_ON_START:-true}
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web_im_chat

  mysql:
    image: mysql:8.4
    container_name: web-im-chat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-web_im_chat}
      MYSQL_USER: ${MYSQL_USER:-web_im}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-web_im_password}
    command:
      - --character-set-server=${MYSQL_CHARSET:-utf8mb4}
      - --collation-server=${MYSQL_COLLATION:-utf8mb4_unicode_ci}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - web_im_chat

  redis:
    image: redis:7-alpine
    container_name: web-im-chat-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - ${REDIS_APPENDONLY:-yes}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - web_im_chat

  nginx:
    image: nginx:1.27-alpine
    container_name: web-im-chat-nginx
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-3000}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-100m}
      NGINX_UPLOAD_CACHE_EXPIRES: ${NGINX_UPLOAD_CACHE_EXPIRES:-7d}
      NGINX_UPLOAD_CACHE_CONTROL: ${NGINX_UPLOAD_CACHE_CONTROL:-public, max-age=604800}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-300}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-300}
      NGINX_SOCKET_TIMEOUT: ${NGINX_SOCKET_TIMEOUT:-86400}
      NGINX_ENVSUBST_FILTER: "^(NGINX_|APP_PORT$)"
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/docker.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - web_im_chat

volumes:
  mysql_data:
  redis_data:
  app_uploads:
  app_logs:

networks:
  web_im_chat:
    driver: bridge
