# Web IM Chat 开发环境 Nginx 反向代理配置
# 使用方式：
# 1. 确保 Node 服务运行在 http://127.0.0.1:3000
# 2. 将本文件复制或软链接到 Nginx 配置目录
# 3. 访问 http://localhost:8080

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream web_im_chat_dev {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 8080;
  server_name localhost 127.0.0.1;

  client_max_body_size 100m;

  access_log /var/log/nginx/web-im-chat-dev.access.log;
  error_log /var/log/nginx/web-im-chat-dev.error.log;

  location /socket.io/ {
    proxy_pass http://web_im_chat_dev;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://web_im_chat_dev;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 300;
    proxy_send_timeout 300;
  }
}
