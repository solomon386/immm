# Web IM Chat 生产环境 Nginx 反向代理配置
# 部署前请替换：
# - server_name chat.example.com;
# - 如启用 HTTPS，请配置 ssl_certificate 和 ssl_certificate_key

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream web_im_chat_prod {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  server_name chat.example.com;

  client_max_body_size 100m;
  server_tokens off;

  access_log /var/log/nginx/web-im-chat.access.log;
  error_log /var/log/nginx/web-im-chat.error.log warn;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location /socket.io/ {
    proxy_pass http://web_im_chat_prod;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
  }

  location /uploads/ {
    proxy_pass http://web_im_chat_prod;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  location / {
    proxy_pass http://web_im_chat_prod;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 300;
    proxy_send_timeout 300;
  }
}

